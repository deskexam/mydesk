app = "deskexam-backend"
primary_region = "delhi"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "8000"
  PYTHONPATH = "/app"
  CHROMA_PERSIST_DIR = "/app/chroma_data"

[processes]
  web = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[[services]]
  http_checks = []
  internal_port = 8000
  processes = ["web"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

[mounts]
  source = "chroma_data"
  destination = "/app/chroma_data"